# Local development stack: Postgres (with pgvector) + Redis.
# In production these are replaced by Supabase (Postgres+pgvector) and a managed Redis.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: notebooklm-db
    environment:
      POSTGRES_USER: notebooklm
      POSTGRES_PASSWORD: notebooklm
      POSTGRES_DB: notebooklm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notebooklm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: notebooklm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
