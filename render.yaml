# Render blueprint: API web service + Celery worker + Redis.
# Postgres + Storage are provided by Supabase (set DATABASE_URL / SUPABASE_* below).
services:
  - type: web
    name: notebooklm-api
    runtime: python
    rootDir: backend
    plan: starter # avoid free-tier cold starts that break SSE streaming
    buildCommand: pip install -e . && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    # Keep-warm: the starter plan already avoids free-tier cold starts. As
    # defense-in-depth, an external uptime pinger hits /api/health every ~10 min
    # (see DEPLOY.md "Keep-warm") — chosen over a Render cron service to keep the
    # blueprint simple and avoid an extra paid worker.
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ENVIRONMENT
        value: production # disables dev auth-bypass + local storage fallback
      - key: REDIS_URL
        fromService:
          name: notebooklm-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_AUDIENCE
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: documents
      - key: OPENROUTER_API_KEY
        sync: false
      - key: EMBEDDINGS_API_KEY
        sync: false
      - key: RERANK_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MAX_UPLOAD_MB
        value: "25" # max accepted upload size (MB); not secret
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: notebooklm-worker
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -e .
    startCommand: celery -A app.workers.celery_app.celery worker --loglevel=info --concurrency=2
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ENVIRONMENT
        value: production # ensures Supabase storage (not local ./uploads fallback)
      - key: REDIS_URL
        fromService:
          name: notebooklm-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: EMBEDDINGS_API_KEY
        sync: false
      - key: RERANK_API_KEY
        sync: false

  - type: redis
    name: notebooklm-redis
    plan: starter
    maxmemoryPolicy: noeviction # Celery broker must not evict queued tasks
    ipAllowList: []
